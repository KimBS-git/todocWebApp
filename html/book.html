<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>토닥 — 예약내역</title>

    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />

    <link rel="stylesheet" href="../css/common.css" />
    <!-- 이 페이지 전용 번들: nav + reservations -->
    <link rel="stylesheet" href="../css/book.css" />
  </head>

  <body>

    <!-- ============================================================
         상단 네비게이션 바 (모든 페이지 공통 구조)
         현재 페이지: 예약내역 → "예약내역" 링크에 .is-active 적용
         ============================================================ -->
    <div id="main-app" class="app-shell app-shell--wide">
      <header class="top-nav">

        <div class="top-nav__brand">
          <span class="top-nav__brand-icon" aria-hidden="true">
            <img src="../images/todoc_logo.png" alt="토닥" width="30" height="30">
          </span>
          토닥
        </div>

        <!-- 주 메뉴 (예약내역이 현재 페이지) -->
        <nav class="top-nav__links" aria-label="주 메뉴">
          <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            홈
          </a>

          <a href="search.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            병원검색
          </a>

          <!-- 예약내역 (현재 페이지): .is-active + aria-current="page" -->
          <a href="book.html" class="nav-item is-active" aria-current="page">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            예약내역
          </a>

          <a href="mypage.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2c-2 0-3.5 1.5-3.5 3.5S10 9 12 9s3.5-1.5 3.5-3.5S14 2 12 2zm-6 12c0-3 2.5-5 6-5s6 2 6 5v3H6v-3z"/>
            </svg>
            마이페이지
          </a>
        </nav>

        <button type="button" class="top-nav__bell" id="btn-dummy-noti" title="알림">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
          </svg>
        </button>
      </header><!-- /top-nav -->

      <main>
        <!-- ============================================================
             예약내역 페이지 본문
             ─────────────────────────────────────────────────────────────
             구성:
               1. 탭 버튼 — "예정된 예약" / "지난 예약" 전환
               2. 예약 카드 목록 — reservations.js renderReservationPage()가 채움

             탭 전환 원리:
               - .res-tab 버튼 클릭 → data-res-tab 값을 확인
               - 해당하는 목록 div의 .hidden 클래스를 토글
             ============================================================ -->
        <section class="page-section is-visible">
          <h1 class="section-title">예약내역</h1>

          <!-- ── 탭 버튼 ──────────────────────────────────────────────
               .res-tab.is-active: 하단에 파란 밑줄 인디케이터가 생깁니다.
               data-res-tab: 클릭 시 어떤 목록을 보여줄지 결정하는 값입니다. -->
          <div class="res-tabs">
            <!-- 예정된 예약 탭 (기본 활성) -->
            <button type="button" class="res-tab is-active" data-res-tab="upcoming">
              예정된 예약
            </button>
            <!-- 지난 예약 탭 -->
            <button type="button" class="res-tab" data-res-tab="past">
              지난 예약
            </button>
          </div>

          <!-- ── 예정된 예약 목록 ─────────────────────────────────────
               reservations.js renderReservationPage()가 예정된 예약 카드를 여기에 삽입합니다.
               기본으로 표시됩니다. -->
          <div id="res-list-upcoming"></div>

          <!-- ── 지난 예약 목록 ───────────────────────────────────────
               기본으로 .hidden 처리됩니다.
               "지난 예약" 탭 클릭 시 .hidden이 제거되어 표시됩니다. -->
          <div id="res-list-past" class="hidden"></div>

        </section>
      </main>
    </div><!-- /main-app -->

    <div
      class="modal-backdrop"
      id="modal-res-detail"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-res-detail-title"
    >
      <div class="modal">
        <div class="modal__head">
          <h3 id="modal-res-detail-title">예약 상세</h3>
          <button type="button" class="modal-close" id="modal-res-detail-x" aria-label="닫기">×</button>
        </div>
        <div id="modal-res-detail-body"></div>
        <div class="modal__foot modal__foot--single">
          <button type="button" class="btn-primary" id="modal-res-detail-close">닫기</button>
        </div>
      </div>
    </div>

    <div
      class="modal-backdrop"
      id="modal-book"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-book-title"
    >
      <div class="modal">
        <div class="modal__head">
          <h3 id="modal-book-title">예약하기</h3>
          <button type="button" class="modal-close" id="modal-book-close" aria-label="닫기">×</button>
        </div>
        <div id="modal-book-body"></div>
        <form id="form-book">
          <input type="hidden" id="book-place-id" />
          <input type="hidden" id="book-place-name" />
          <input type="hidden" id="book-place-address" />
          <input type="hidden" id="book-place-phone" />
          <input type="hidden" id="book-place-y" />
          <input type="hidden" id="book-place-x" />
          <div class="form-group">
            <label for="book-datetime">예약 일시</label>
            <input type="datetime-local" id="book-datetime" required />
          </div>
          <div class="form-group">
            <label for="book-reason">방문 유형</label>
            <input type="text" id="book-reason" placeholder="예: 예방접종" />
          </div>
          <div class="form-group">
            <label for="book-pet-name">반려동물 이름</label>
            <input type="text" id="book-pet-name" placeholder="예: 뭉치" />
          </div>
          <div class="form-group">
            <label for="book-name">보호자 이름</label>
            <input type="text" id="book-name" placeholder="이름 입력" />
          </div>
          <div class="form-group">
            <label for="book-phone">보호자 전화번호</label>
            <input type="text" id="book-phone" required placeholder="010-0000-0000" autocomplete="tel" />
            <p id="book-phone-error" class="form-error hidden" role="alert">
              '010-0000-0000' 형식으로 입력해주세요
            </p>
          </div>
          <button type="submit" class="btn-primary">예약 완료</button>
        </form>
      </div>
    </div>

    <div
      class="modal-backdrop"
      id="modal-review"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-review-title"
    >
      <div class="modal">
        <div class="modal__head">
          <h3 id="modal-review-title">후기 작성</h3>
          <button type="button" class="modal-close" id="modal-review-x" aria-label="닫기">×</button>
        </div>
        <div class="form-group">
          <span class="label-block">별점</span>
          <div class="review-stars-input" id="review-stars-input" role="group" aria-label="별점 선택">
            <button type="button" class="review-star-btn" data-star="1" aria-label="1점">★</button>
            <button type="button" class="review-star-btn" data-star="2" aria-label="2점">★</button>
            <button type="button" class="review-star-btn" data-star="3" aria-label="3점">★</button>
            <button type="button" class="review-star-btn" data-star="4" aria-label="4점">★</button>
            <button type="button" class="review-star-btn" data-star="5" aria-label="5점">★</button>
          </div>
          <input type="hidden" id="review-star-value" value="0" />
        </div>
        <div class="form-group">
          <label for="review-comment">코멘트</label>
          <textarea id="review-comment" rows="4" placeholder="방문 소감을 남겨주세요"></textarea>
        </div>
        <div class="modal__foot">
          <button type="button" class="btn-secondary" id="modal-review-close">닫기</button>
          <button type="button" class="btn-primary" id="modal-review-save">저장</button>
        </div>
      </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/book.js"></script>

  </body>
</html>
